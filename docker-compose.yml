services:
  feauxauth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feauxauth
      POSTGRES_USER: feauxauth
      POSTGRES_PASSWORD: feauxauth
    volumes:
      - feauxauth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feauxauth"]
      interval: 5s
      timeout: 3s
      retries: 5

  feauxauth:
    build: ../FeauxAuth
    environment:
      DATABASE_URL: jdbc:postgresql://feauxauth-db:5432/feauxauth
      DATABASE_USERNAME: feauxauth
      DATABASE_PASSWORD: feauxauth
      FEAUXAUTH_ISSUER: https://localhost
      FEAUXAUTH_EXTRA_AUDIENCES: mcp-server
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: feauxauth
    depends_on:
      feauxauth-db:
        condition: service_healthy
    restart: unless-stopped

  greenplum:
    image: greenplum-sne-full:latest
    hostname: greenplum-sne
    ports:
      - "15432:5432"
    volumes:
      - gpdata:/home/gpadmin/data
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/greenplum-db/bin/psql -U gpadmin -d postgres -tAc 'SELECT 1' >/dev/null 2>&1 || su - gpadmin -c 'psql -d postgres -tAc \"SELECT 1\"' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 120s

  tpcds-loader:
    image: postgres:16
    depends_on:
      greenplum:
        condition: service_healthy
    volumes:
      - ../greenplum-sne/tpcds:/tpcds:ro
      - ./docker/tpcds-load.sh:/tpcds-load.sh:ro
    environment:
      GPHOST: greenplum-sne
      GPPORT: "5432"
      GPUSER: gpadmin
      PGPASSWORD: "VMware1!"
      DATABASE: tpcds
      TPCDS_DIR: /tpcds
    entrypoint: ["/bin/bash", "/tpcds-load.sh"]
    restart: "no"

  demo-users:
    build:
      context: ./docker
      dockerfile: Dockerfile.demo-users
    depends_on:
      tpcds-loader:
        condition: service_completed_successfully
      feauxauth:
        condition: service_started
    volumes:
      - ./docker/setup-demo-users.sh:/setup-demo-users.sh:ro
    environment:
      GPHOST: greenplum-sne
      GPPORT: "5432"
      GPUSER: gpadmin
      PGPASSWORD: "VMware1!"
      DATABASE: tpcds
      FEAUXAUTH_URL: http://feauxauth:8080
      FEAUXAUTH_ADMIN_USER: admin
      FEAUXAUTH_ADMIN_PASS: feauxauth
    entrypoint: ["/bin/bash", "/setup-demo-users.sh"]
    restart: "no"

  mcp:
    # GA 1.0.0 ships linux/amd64 only. On Apple Silicon Docker Desktop runs
    # this under Rosetta transparently; the binary is statically linked so
    # there's no libc surprise.
    image: debian:stable-slim
    platform: linux/amd64
    depends_on:
      feauxauth:
        condition: service_started
      demo-users:
        condition: service_completed_successfully
    volumes:
      - ../Tanzu-GP-MCP-Server/gp-mcp-server-1.0.0-linux-x64:/app/gp-mcp-server:ro
      - ./mcp-docker-config.yaml:/app/config.yaml:ro
    working_dir: /app
    command: ["/app/gp-mcp-server", "streamable-http", "--config-file=/app/config.yaml", "--readonly=false"]
    restart: unless-stopped

  data-chat:
    build: ./data-chat
    depends_on:
      feauxauth:
        condition: service_started
      mcp:
        condition: service_started
    env_file:
      - ./data-chat/.env
    volumes:
      - ./data-chat/config/personas.yaml:/app/config/personas.yaml:ro
    extra_hosts:
      # Allow LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1 on Linux.
      # macOS/Windows Docker Desktop already provide this; extra_hosts is a no-op there.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - feauxauth
      - mcp
      - data-chat
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  feauxauth_pgdata:
  gpdata:
  caddy_data:
  caddy_config:
