authProviders:
  - id: feauxauth
    issuerUri: https://localhost
    internalUri: http://feauxauth:8080
    clientRegistrationMode: dynamic
    scopes: [openid, profile, email]

mcpServers:
  - id: gp-mcp
    url: https://localhost/mcp
    internalUrl: http://mcp:8080/mcp
    label: "Greenplum MCP"

personas:
  - id: viewer
    label: "Read-only Viewer"
    description: "SELECT on a narrow slice"
    authProvider: feauxauth
    mcpServer: gp-mcp
  - id: analyst
    label: "Analyst"
    description: "Read all tpcds tables"
    authProvider: feauxauth
    mcpServer: gp-mcp
  - id: dba
    label: "DBA"
    description: "Full privileges"
    authProvider: feauxauth
    mcpServer: gp-mcp
