spring:
  application:
    name: gp-chat
  config:
    import: optional:file:/app/config/personas.yaml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:disabled}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:disabled}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-3.1-flash-lite-preview
    mcp:
      client:
        enabled: false

server:
  port: 8080
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.baskettecase.gpchat: DEBUG
