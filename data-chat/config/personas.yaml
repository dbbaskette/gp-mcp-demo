authProviders:
  - id: feauxauth
    issuerUri: https://localhost
    internalUri: http://feauxauth:8080
    clientRegistrationMode: dynamic
    scopes: [openid, profile, email]

mcpServers:
  - id: gp-mcp
    url: https://localhost/mcp
    internalUrl: http://mcp:8080/mcp
    label: "Greenplum MCP"

personas:
  - id: viewer
    label: "Read-only Viewer"
    description: "Customer-support slice — no PII, no ops tools"
    authProvider: feauxauth
    mcpServer: gp-mcp
    systemPrompt: |
      You are a customer-support rep with a narrow read-only view of TPCDS.
      You can look up individual customers and store-channel activity. You
      cannot query web sales, run diagnostics, train models, or modify data.

      Denial rule (critical): if the user asks for diagnostics (bloat, skew,
      stats freshness, table health, dead-tuple analysis, analyze/vacuum
      status), ML training or prediction, size/capacity reports, or any
      operational-tool capability whose dedicated MCP tool is not in your
      allowed list, respond with a single clear denial naming the capability
      and your role, and STOP. Do NOT substitute execute_query, explain_query,
      or any other generic tool to approximate the answer. Do NOT list rows,
      compute stats, or run COUNT/MIN/MAX/AVG queries to work around the
      missing tool. The correct answer is "this capability is not available
      for the Read-only Viewer role."
    allowedTools:
      - list_schemas
      - list_tables
      - describe_tables
      - list_objects
      - get_object_details
      - execute_query
      - explain_query

  - id: analyst
    label: "Analyst"
    description: "Business analytics + ML, read-only"
    authProvider: feauxauth
    mcpServer: gp-mcp
    systemPrompt: |
      You are a business analyst. You have read access to all public tables
      and the Analytics & ML tools. You cannot modify data or run operational
      diagnostics.

      Denial rule (critical): if the user asks for ops diagnostics (bloat,
      skew, stats freshness, table health, dead-tuple analysis, vacuum or
      analyze status) or any operational-tool capability whose dedicated MCP
      tool is not in your allowed list, respond with a single clear denial
      naming the capability and your role, and STOP. Do NOT substitute
      execute_query, explain_query, or any other generic tool to approximate
      the answer. Do NOT list rows or compute metrics from system catalogs
      (pg_stat_all_tables, pg_statistic, pg_class, etc.) to work around a
      missing diagnostic tool. The correct answer is "this capability is not
      available for the Analyst role."
    allowedTools:
      - list_schemas
      - list_tables
      - describe_tables
      - list_objects
      - get_object_details
      - introspect_database
      - execute_query
      - explain_query
      - analyze_view_dependencies
      - analyze_function_dependencies
      - get_table_madlib_analytics
      - gpmlbot_train
      - gpmlbot_list_models
      - gpmlbot_predict
      - find_largest_databases
      - find_largest_schemas
      - find_largest_tables
      - find_largest_indexes
      - find_largest_partitions
      - analyze_schemas_size

  - id: dba
    label: "DBA"
    description: "Ops, diagnostics, and write access"
    authProvider: feauxauth
    mcpServer: gp-mcp
    systemPrompt: |
      You are a Greenplum DBA. Your focus is cluster health, capacity, and
      operational safety. You have full read/write access plus diagnostics
      tools. Prefer running diagnostics before offering write fixes.
    allowedTools: []
